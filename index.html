    <style>
        body { margin: 0; padding: 20px; background-color: #1a1a1a; color: white; font-family: 'Pretendard', sans-serif; }
        
        /* 탭 메뉴 스타일 */
        /* 탭 메뉴 스타일 (모바일 좌우 스크롤 적용) */
        .line-selector { 
            display: flex; 
            justify-content: flex-start; /* 모바일 스크롤 버그 방지를 위해 왼쪽 정렬 */
            gap: 10px; 
            margin-bottom: 20px; 
            overflow-x: auto;            /* 가로 스크롤 활성화 */
            white-space: nowrap;         /* 버튼들이 아래로 줄바꿈되지 않도록 고정 */
            padding: 10px 5px;           /* 스크롤바와 버튼 사이 간격 확보 */
            -webkit-overflow-scrolling: touch; /* 아이폰에서 부드러운 스크롤 지원 */
        }
        /* 스크롤바를 조금 더 슬림하고 깔끔하게 디자인 */
        .line-selector::-webkit-scrollbar {
            height: 4px; 
        }
        .line-selector::-webkit-scrollbar-thumb {
            background-color: #555; 
            border-radius: 10px;
        }
        .line-selector button { 
            padding: 10px 25px; border: none; border-radius: 20px; 
            background: #333; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; 
            flex-shrink: 0; /* ⭐ 화면이 좁아져도 버튼 글자가 구겨지지 않게 보호 */
        }
        /* 활성화된 버튼 색상 */
        #btn-1.active { background-color: #0052A4; color: white; }
        #btn-2.active { background-color: #00A14B; color: white; }
        #btn-3.active { background-color: #EF7C1C; }
        #btn-4.active { background-color: #00A3D2; }
        #btn-5.active { background-color: #996CAC; color: white; }
        #btn-6.active { background-color: #CD7C2F; color: white; }
        #btn-7.active { background-color: #747F00; color: white; }
        #btn-8.active { background-color: #E6186C; color: white; }
        #btn-9.active { background-color: #BDB092; color: white; }
        #btn-경춘.active {background-color: #00B0A2; color: white; }
        #btn-수인분당.active { background-color: #FFB300; color: black; }

        #btn-김포골드.active { background-color: #A17800; color: white; }

        #btn-우이.active { background-color: #B0AD00; color: white; }

        h1 { display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 10px; transition: color 0.3s; }
        .title-logo { width: 28px; height: 28px; vertical-align: middle; margin-right: 8px; object-fit: contain; }
        .info-text { text-align: center; font-size: 12px; color: #888; margin-bottom: 20px; }

        #line-container { 
            width: 100%; height: 80vh; background: #1a1a1a; 
            border-radius: 15px; overflow-y: auto; overflow-x: hidden; 
            position: relative; border: 1px solid #333;
        }

        /* 노선 바 (JS에서 높이와 색상이 조절됨) */
        .line-bar { 
            position: absolute; left: 50%; transform: translateX(-50%);
            top: 0; width: 10px; z-index: 1; transition: background-color 0.3s, height 0.3s;
        }

        .station-wrapper { display: flex; flex-direction: column; padding: 100px 0; gap: 140px; position: relative; z-index: 2; }

        .station { display: flex; justify-content: center; align-items: center; position: relative; width: 100%; height: 20px; }
        .station-dot { width: 16px; height: 16px; background: white; border: 3px solid #EF7C1C; border-radius: 50%; z-index: 3; flex-shrink: 0; transition: border-color 0.3s; }
        /* 기존 .station-name 찾아서 아래 내용으로 덮어쓰기 */
        .station-name { 
            position: absolute; 
            left: calc(50% + 20px); 
            font-size: 14px; 
            font-weight: bold; 
            color: #aaa; 
            white-space: nowrap;
            display: flex;       /* 화살표와 텍스트 정렬을 위해 추가 */
            align-items: center;
            gap: 8px;           /* 화살표와 글자 사이 간격 */
        }

        /* 방향 안내 화살표 스타일 */
        .dir-arrow {
            font-size: 10px;
            font-weight: normal;
            opacity: 0.6;
            padding: 1px 4px;
            border-radius: 4px;
            background: #2a2a2a;
        }
        .arrow-up { color: #ff4d4d; }   /* 상행(오른쪽)은 붉은 계열 위쪽 화살표 */
        .arrow-down { color: #4da6ff; } /* 하행(왼쪽)은 푸른 계열 아래쪽 화살표 */

        /* 열차 스타일 */
        .train-container { position: absolute; top: 50%; transform: translateY(-50%); display: flex; align-items: center; z-index: 10; cursor: pointer; }
        .train-up { left: calc(50% + 60px); animation: moveRight 0.6s infinite alternate ease-in-out; }
        .train-down { right: calc(50% + 60px); flex-direction: row-reverse; animation: moveLeft 0.6s infinite alternate ease-in-out; }
        .train-img { width: 40px; height: auto; }

        .popup-close { margin-top: 20px; width: 100%; background: #444; border: none; color: white; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* 2. 노선 변경 함수 */
        function changeLine(lineNum) {
    currentLine = lineNum;
    const config = lineConfig[lineNum];

    // 모든 버튼에서 active 클래스 제거 후 클릭한 버튼만 추가
    document.querySelectorAll('.line-selector button').forEach(btn => {
        btn.classList.remove('active');
    });

    document.getElementById('header-logo').src = config.logo;
    document.getElementById('line-name-text').innerText = config.name;

    // 노선 바 색상 및 높이 조절
    const bar = document.getElementById('main-bar');
    bar.style.backgroundColor = config.color;
    bar.style.height = config.barHeight;

    renderStations();
    updateSubway();
}

        /* 3. 역 생성 함수 */
        function renderStations() {
            const mapEl = document.getElementById('map');
            mapEl.innerHTML = '';
            const config = lineConfig[currentLine];
            
            config.stations.forEach(name => {
                const div = document.createElement('div');
                div.className = 'station';
                div.id = `statn-${name}`;
                div.innerHTML = `
                    <div class="station-dot" style="border-color: ${config.color}"></div>
                    <div class="station-name">${name}</div>
                `;
                mapEl.appendChild(div);
            });
        }

        /* 4. 데이터 업데이트 함수 */
        /* 4. 데이터 업데이트 함수 */
        /* 4. 데이터 업데이트 함수 (HTTPS 보안 및 AllOrigins 파싱 완벽 통합본) */
async function updateSubway() {
    const config = lineConfig[currentLine];
    
    // 1. 기존에 화면에 그려져 있던 열차들 싹 지우기
    document.querySelectorAll('.train-container').forEach(el => el.remove());

    try {
        let apiLineName = config.name;
        
        // 서울시 API용 노선명 예외 처리
        if (currentLine === '1') apiLineName = '1호선';
        if (currentLine === '우이') apiLineName = '우이신설선';
        if (currentLine === '신림') apiLineName = '신림선';
        if (currentLine === '서해') apiLineName = '서해선';
        if (currentLine === '김포골드') apiLineName = '김포골드라인';
        if (currentLine === '경강') apiLineName = '경강선';
        if (currentLine === '2') apiLineName = '2호선';
        if (currentLine === '6') apiLineName = '6호선';
        if (currentLine === '7') apiLineName = '7호선';
        if (currentLine === '8') apiLineName = '8호선'; 
        if (currentLine === '9') apiLineName = '9호선'; 
        if (currentLine === '신분당') apiLineName = '신분당선';

        // 깃허브(HTTPS) 환경에서 차단당하지 않도록 안전한 주소 및 프록시 설정
        const targetUrl = `https://swopenAPI.seoul.go.kr/api/subway/${API_KEY}/json/realtimePosition/0/80/${encodeURIComponent(apiLineName)}`;
        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
        
        if (!response.ok) throw new Error("API 우회 서버 응답 실패");
        
        const json = await response.json();
        
        // ⭐ 중요: AllOrigins 우회서버를 거치면 json.contents 안에 있는 '문자열'을 진짜 데이터로 깨부수어 줘야 합니다!
        const data = JSON.parse(json.contents);

        const now = new Date();
        // 트래픽 절약을 위한 20초 주기 문구 반영
        document.getElementById('last-update').innerText = `마지막 갱신: ${now.toLocaleTimeString()} • 20초마다 자동 갱신`;

        // 데이터가 아예 비어있거나 한도 초과인 경우 예외 처리
        if (!data || !data.realtimePositionList) {
            console.log("운행 중인 열차가 없거나 API 한도 초과입니다.");
            document.getElementById('last-update').innerText = `갱신 완료: 현재 운행 중인 열차가 없습니다.`;
            return;
        }

        // 2. 진짜 열차 데이터 순회하면서 지도에 그리기 시작
        data.realtimePositionList.forEach(train => {
            let cleanStatnNm = train.statnNm.split('(')[0]; // 역 이름에서 괄호 제거
            
            // 예외 노선 역명 매칭 룰
            if (currentLine === '에버라인') {
                cleanStatnNm = cleanStatnNm.replace('·', '').replace('.', ''); 
                if (cleanStatnNm.includes("시청")) cleanStatnNm = "시청·용인대";
                if (cleanStatnNm.includes("운동장")) cleanStatnNm = "운동장·송담대";
                if (cleanStatnNm.includes("에버랜드")) cleanStatnNm = "전대·에버랜드";
            }
            if (currentLine === '9' && cleanStatnNm === "반포본동") {
                cleanStatnNm = "구반포";
            }
            
            // 내 HTML 화면에 해당 역이 존재하는지 태그 ID 찾기
            const targetStation = document.getElementById(`statn-${cleanStatnNm}`);

            if (targetStation) {
                const trainNo = train.trainNo;
                const tNo = parseInt(trainNo); 
                let opName, opColor, imgSrc;

                // 급행 여부 (0: 일반, 1: 급행)
                const isExpress = train.directAt === "1";

                // 노선별 소속 회사 및 고증 아이콘 분류 시스템
                if (currentLine === '1') {
                    if (isExpress) {
                        opName = "코레일"; opColor = "#FF0000"; imgSrc = config.k_img;
                    } else {
                        if (config.seoulMetroList.includes(trainNo) || (tNo >= 1000 && tNo <= 1999 && trainNo.length === 4 && !trainNo.startsWith('3'))) {
                            opName = "서교공"; opColor = config.color; imgSrc = config.s_img;
                        } else {
                            opName = "코레일"; opColor = config.color; imgSrc = config.k_img;
                        }
                    }
                }
                else if (currentLine === '공항') {
                    const tNumStr = String(train.trainNo).trim();
                    const isDirect = tNumStr.length === 4 && tNumStr.startsWith('1');
                    if (isDirect) {
                        opName = "직통열차"; opColor = "#F15A22"; imgSrc = "1101.png"; 
                    } else {
                        opName = "공항철도"; opColor = config.color; imgSrc = config.s_img;
                    }
                }
                else {
                    opName = config.name; opColor = config.color; imgSrc = config.s_img;
                }

                // 3. 열차를 화면에 꽂아 넣기 위한 HTML 객체 생성
                const trainDiv = document.createElement('div');
                
                // 상하행선 구별 (updnLine: 0은 상행/내선, 1은 하행/외선)
                const isUpLine = train.updnLine === "0";
                trainDiv.className = `train-container ${isUpLine ? 'train-up' : 'train-down'}`;

                // 팝업 이벤트 연결을 위한 커스텀 데이터 심기
                trainDiv.onclick = () => showPopup(train, opName, isExpress);

                // 열차 아이콘과 미니 텍스트 정보 구성
                trainDiv.innerHTML = `
                    <img src="${imgSrc}" class="train-img" onerror="this.src='${config.s_img}'">
                    <div class="train-info" style="border-left: 3px solid ${opColor}">
                        <strong>${train.trainNo}</strong><br>
                        <span style="color: ${isExpress ? '#ff4d4d' : '#fff'}">${isExpress ? '[급행] ' : ''}${train.rcvNm} 행</span>
                    </div>
                `;

                // 해당 역의 HTML 위치에 열차 안착시키기
                targetStation.appendChild(trainDiv);
            }
        });

    } catch (error) {
        console.error("지하철 데이터 갱신 중 치명적 오류:", error);
        document.getElementById('last-update').innerText = "데이터 연결 지연 (잠시 후 자동 재시도)";
    }
}

        function showDetail(train, opName, opColor) {
    const popup = document.getElementById('train-popup');
    const content = document.getElementById('popup-content');
    
    // 노선별 편성 정보 설정
    let formationText = "10량 편성"; // 기본값 (3, 4호선 등)
    
    // --- showDetail() 함수 내부의 편성 정보 부분 ---

    if (currentLine === '1') {
    formationText = "10량 편성"; 
} 
else if (currentLine === '2') {
    // ⭐ 2호선 열차 번호 기반 량수 정밀 고증
    const tNo = parseInt(train.trainNo);
    
    if (tNo >= 257 && tNo <= 260) {
        formationText = "4량 편성 (성수지선)"; // 257~260편성 성수지선 저항/신형
    } else if (tNo >= 245 && tNo <= 248) {
        formationText = "6량 편성 (신도림지선)"; // 245~248편성 신도림지선
    } else if (train.trainNo.startsWith('2') && train.trainNo.length === 4) {
        // 열차 번호가 4자리이면서 2로 시작하는 지선 알바차량 등 예외 처리
        const secondDigit = train.trainNo.charAt(1);
        if (secondDigit === '1' || secondDigit === '2') {
            formationText = "4량 편성 (성수지선)";
        } else if (secondDigit === '3' || secondDigit === '4') {
            formationText = "6량 편성 (신도림지선)";
        } else {
            formationText = "10량 편성 (본선)";
        }
    } else {
        formationText = "10량 편성 (본선)"; // 일반적인 순환선 본선 열차
    } 
} else if (currentLine === '5' || currentLine === '6' || currentLine === '7') {
    formationText = "8량 편성"; // ⭐ 5, 6, 7호선은 8량 지정
} else if (currentLine === '경춘' || currentLine === '경의중앙') {
    if (currentLine === '경의중앙' && train.statnTnm === "서울") {
        formationText = "4량 편성";
    } else {
        formationText = "8량 편성";
    }
} else if (currentLine === '수인분당' || currentLine === '공항' || currentLine === '8' || currentLine === '9' || currentLine === '신분당') {
    formationText = "6량 편성"; // ⭐ 9호선도 6량 편성 그룹에 추가!
} else if (currentLine === '경강') {
    formationText = "4량 편성"; // ⭐ 경강선 4량 지정
} else if (currentLine === '김포골드') {
    formationText = "2량 편성 (경전철)"; // ⭐ 2량 지정
} else if (currentLine === '서해') {
    formationText = "4량 편성"; // ⭐ 서해선 4량 지정
} else if (currentLine === '에버라인') {
    formationText = "1량 단편성 (무인 운전)"; // ⭐ 1량 지정
} else if (currentLine === '신림') {
    formationText = "3량 편성 (고무차륜)"; // ⭐ 3량 지정
} else if (currentLine === '우이') {
    formationText = "2량 편성 (무인 운전)"; // ⭐ 2량 지정
}

    const isExpress = opColor === "#FF0000";
    const statusMap = { "0": "진입 중", "1": "도착함", "2": "출발함" };
    const currentStatus = statusMap[train.trainSttus] || "운행 중";
    
    const dirText = currentLine === "3" ? "대화 / 오금 방면" : "당고개(진접) / 오이도 방면";
    const direction = train.updnLine === "0" ? `상행` : `하행`;

    content.innerHTML = `
        <div style="border-bottom: 2px solid ${opColor}; padding-bottom: 10px; margin-bottom: 15px;">
            <h2 style="margin: 0; color: white;">
                ${train.trainNo} 
                <span style="font-size: 0.8rem; color: #ccc;">열차</span>
                ${isExpress ? '<span style="background: red; color: white; padding: 2px 5px; border-radius: 4px; font-size: 12px; margin-left: 5px; vertical-align: middle;">급행</span>' : ''}
            </h2>
            <div style="display: inline-block; background: ${opColor}; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-top: 5px;">
                ${opName} 소속
            </div>
        </div>
        <div style="text-align: left; line-height: 1.8; font-size: 14px;">
            <p style="margin: 8px 0;">🚩 <b>행선지:</b> <span style="color: #FFD700;">${train.statnTnm}행</span></p>
            <p style="margin: 8px 0;">🚉 <b>현재 위치:</b> ${train.statnNm}역 (${currentStatus})</p>
            <p style="margin: 8px 0;">↕️ <b>운행 방향:</b> ${direction}</p>
            <p style="margin: 8px 0;">🔢 <b>편성 정보:</b> <span style="color: #00FF00;">${formationText}</span></p>
        </div>
    `;

    popup.style.borderColor = opColor;
    popup.style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
}
